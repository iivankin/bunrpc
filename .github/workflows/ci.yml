name: CI

on:
  push:
  pull_request:

env:
  BUN_VERSION: '1.3.11'
  NODE_VERSION: '24'
  NPM_VERSION: '11.15.0'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      mcp: ${{ steps.filter.outputs.mcp }}
      openapi: ${{ steps.filter.outputs.openapi }}
      react: ${{ steps.filter.outputs.react }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'packages/core/**'
              - '!packages/core/**/*.test.ts'
            mcp:
              - 'packages/mcp/**'
              - '!packages/mcp/**/*.test.ts'
            openapi:
              - 'packages/openapi/**'
              - '!packages/openapi/**/*.test.ts'
            react:
              - 'packages/react/**'
              - '!packages/react/**/*.test.ts'

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run typecheck
      - run: bun run test

  publish-core:
    needs: [changes, test]
    if: |
      github.event_name == 'push'
      && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      && needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install npm CLI
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - run: bun install --frozen-lockfile

      - run: bun run stage:package --package=core

      - run: npm publish --access public
        working-directory: .tmp-release/core

  publish-react:
    needs: [changes, test, publish-core]
    if: |
      always()
      && github.event_name == 'push'
      && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      && needs.changes.outputs.react == 'true'
      && (needs.changes.outputs.core != 'true' || needs.publish-core.result == 'success')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install npm CLI
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - run: bun install --frozen-lockfile

      - run: bun run stage:package --package=react

      - run: npm publish --access public
        working-directory: .tmp-release/react

  publish-openapi:
    needs: [changes, test, publish-core]
    if: |
      always()
      && github.event_name == 'push'
      && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      && needs.changes.outputs.openapi == 'true'
      && (needs.changes.outputs.core != 'true' || needs.publish-core.result == 'success')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install npm CLI
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - run: bun install --frozen-lockfile

      - run: bun run stage:package --package=openapi

      - run: npm publish --access public
        working-directory: .tmp-release/openapi

  publish-mcp:
    needs: [changes, test, publish-core]
    if: |
      always()
      && github.event_name == 'push'
      && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      && needs.changes.outputs.mcp == 'true'
      && (needs.changes.outputs.core != 'true' || needs.publish-core.result == 'success')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install npm CLI
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - run: bun install --frozen-lockfile

      - run: bun run stage:package --package=mcp

      - run: npm publish --access public
        working-directory: .tmp-release/mcp
