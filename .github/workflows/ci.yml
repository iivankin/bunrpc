name: CI

on:
  push:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      openapi: ${{ steps.filter.outputs.openapi }}
      react: ${{ steps.filter.outputs.react }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'packages/core/**'
            openapi:
              - 'packages/openapi/**'
            react:
              - 'packages/react/**'

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - run: bun install --frozen-lockfile
      - run: bun run check

  publish-core:
    needs: [changes, test]
    if: |
      github.event_name == 'push'
      && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      && needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - run: bun install --frozen-lockfile

      - run: bun publish --access public
        working-directory: packages/core
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-react:
    needs: [changes, test]
    if: |
      github.event_name == 'push'
      && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      && needs.changes.outputs.react == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - run: bun install --frozen-lockfile

      - run: bun publish --access public
        working-directory: packages/react
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-openapi:
    needs: [changes, test]
    if: |
      github.event_name == 'push'
      && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      && needs.changes.outputs.openapi == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - run: bun install --frozen-lockfile

      - run: bun publish --access public
        working-directory: packages/openapi
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
